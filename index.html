<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a1410">
<title>Mundial 2026 · Hora española</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23f2c14e'/%3E%3Cpolygon points='50,28 60,38 56,52 44,52 40,38' fill='%230a1410'/%3E%3C/svg%3E">
<style>
:root{
  --pitch:#0a1410; --pitch2:#0e1c15;
  --card:#13241b; --card2:#1a3024; --line:#264634;
  --chalk:#f0f4ed; --muted:#8ba398;
  --gold:#f2c14e; --gold2:#e6a833;
  --esp:#e0312e; --esp2:#f2c14e;
  --uru:#4ea6d6;
  --can:#e8453c;
  --live:#58d68d;
  --done:#5a7a68;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--pitch);color:var(--chalk);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;line-height:1.4;font-size:15px}
body{padding-bottom:84px;min-height:100vh;overscroll-behavior-y:contain}

/* ─── Header ─── */
header{
  position:sticky;top:0;z-index:50;
  background:linear-gradient(180deg,var(--pitch) 0%,var(--pitch) 88%,transparent 100%);
  padding:14px 16px 10px;
  border-bottom:1px solid transparent;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
}
.brand{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.title{font-size:20px;font-weight:800;letter-spacing:-0.02em}
.title span{color:var(--gold)}
.sync{
  background:var(--gold);color:#1a1408;border:none;border-radius:999px;
  padding:8px 14px;font-weight:700;font-size:13px;cursor:pointer;
  display:flex;align-items:center;gap:6px;font-family:inherit;
}
.sync:disabled{opacity:0.5}
.sync .spin{display:inline-block;transition:transform 0.3s}
.sync.loading .spin{animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none;-ms-overflow-style:none;flex-wrap:nowrap}
.chips::-webkit-scrollbar{display:none}
.chip{
  flex:0 0 auto;background:var(--card);color:var(--chalk);border:1px solid var(--line);
  padding:0 12px;height:32px;border-radius:16px;font-size:13px;font-weight:600;cursor:pointer;
  font-family:inherit;display:inline-flex;align-items:center;gap:5px;line-height:1;
  white-space:nowrap;
}
.chip .flag{font-size:14px;line-height:1}
.chip.on{background:var(--gold);border-color:var(--gold);color:#1a1408}
.chip.fav-slot-0.on{background:var(--esp);border-color:var(--esp);color:#fff}
.chip.fav-slot-1.on{background:var(--uru);border-color:var(--uru);color:#0a1410}
.chip.fav-slot-2.on{background:var(--gold);border-color:var(--gold);color:#1a1408}
.chip.fav-pick{background:transparent;border-style:dashed;color:var(--gold)}
.chip.fav-pick:hover{border-color:var(--gold)}

/* ─── Status ─── */
.status{
  margin:0 16px 6px;padding:8px 12px;border-radius:10px;font-size:12px;
  background:rgba(242,193,78,0.12);border:1px solid rgba(242,193,78,0.25);
  color:var(--gold);display:none;
}
.status.show{display:block}
.status.error{background:rgba(224,49,46,0.12);border-color:rgba(224,49,46,0.3);color:#ff8a87}
.status.ok{background:rgba(88,214,141,0.12);border-color:rgba(88,214,141,0.3);color:var(--live)}

/* ─── Main ─── */
main{padding:6px 14px 20px;max-width:720px;margin:0 auto}

.day{margin:18px 0 4px}
.day-h{
  font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;
  color:var(--muted);padding:0 2px 8px;display:flex;align-items:center;gap:8px;
}
.day-h.today{color:var(--gold)}
.day-h .dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:0.6}

/* ─── Match card ─── */
.match{
  background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:12px 14px;margin-bottom:8px;cursor:pointer;position:relative;
  display:flex;align-items:center;gap:12px;overflow:hidden;
}
.match::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:transparent;
}
.match.fav-slot-0::before{background:var(--esp)}
.match.fav-slot-1::before{background:var(--uru)}
.match.fav-slot-2::before{background:var(--gold)}
.match.fav-slot-0.fav-slot-1::before{background:linear-gradient(180deg,var(--esp) 50%,var(--uru) 50%)}
.match.fav-slot-0.fav-slot-2::before{background:linear-gradient(180deg,var(--esp) 50%,var(--gold) 50%)}
.match.fav-slot-1.fav-slot-2::before{background:linear-gradient(180deg,var(--uru) 50%,var(--gold) 50%)}
.match.played{background:var(--card2)}
.match.live::before{background:var(--live)}

.time-col{flex-shrink:0;text-align:center;min-width:48px}
.time{font-weight:700;font-size:15px;letter-spacing:-0.02em}
.moon{font-size:10px;color:var(--gold);margin-top:2px}
.played .time{color:var(--muted);font-weight:600}

.teams{flex:1;min-width:0}
.team-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:1px 0}
.team-name{
  font-weight:600;font-size:15px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;
  display:flex;align-items:center;gap:7px;
}
.team-name .flag{font-size:17px;line-height:1;flex-shrink:0}
.team-name .nm{overflow:hidden;text-overflow:ellipsis}
.team-name .code{
  font-size:10px;color:var(--muted);margin-left:6px;font-weight:600;
  letter-spacing:0.05em;font-family:ui-monospace,monospace;
}
.team-name.placeholder{color:var(--muted);font-style:italic;font-weight:500;font-size:14px}
.score{
  font-weight:800;font-size:18px;min-width:18px;text-align:center;color:var(--gold);
  font-variant-numeric:tabular-nums;
}
.played .score{color:var(--chalk)}
.played .team-row.loser .team-name{color:var(--muted)}
.played .team-row.loser .score{color:var(--muted)}
.no-score{color:var(--muted);font-size:12px;font-weight:500}

.venue{
  font-size:11px;color:var(--muted);margin-top:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.venue .grp{
  display:inline-block;background:var(--line);color:var(--chalk);
  padding:1px 6px;border-radius:4px;font-weight:700;font-size:10px;
  margin-right:6px;letter-spacing:0.05em;
}

/* ─── Groups view ─── */
.groups-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media (max-width:480px){.groups-grid{grid-template-columns:1fr}}
.group-card{
  background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;
}
.group-title{
  font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;
  color:var(--gold);margin-bottom:8px;
}
.group-table{width:100%;font-size:13px;border-collapse:collapse}
.group-table th{
  font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:0.05em;padding:4px 2px;text-align:center;font-family:ui-monospace,monospace;
}
.group-table th:first-child{text-align:left;padding-left:0}
.group-table td{padding:5px 2px;text-align:center;font-variant-numeric:tabular-nums}
.group-table td:first-child{text-align:left;font-weight:600;padding-left:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
.group-table td .flag{font-size:14px;margin-right:5px;vertical-align:-1px}
.group-table td.pts{font-weight:800;color:var(--gold)}
.group-table tr.qualified td{color:var(--chalk)}
.group-table tr.qualified td:first-child::before{
  content:'';display:inline-block;width:3px;height:14px;background:var(--live);
  vertical-align:middle;margin-right:6px;border-radius:2px;
}
.group-table tr.fav-slot-0 td:first-child{color:#ff8a87}
.group-table tr.fav-slot-1 td:first-child{color:var(--uru)}
.group-table tr.fav-slot-2 td:first-child{color:var(--gold)}

/* ─── Knockout view ─── */
.ko-phase{margin-bottom:24px}
.ko-title{
  font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;
  color:var(--gold);margin:18px 0 8px;display:flex;align-items:center;gap:10px;
}
.ko-title::after{
  content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent);
}
.ko-dates{font-size:11px;color:var(--muted);font-weight:600;text-transform:none;letter-spacing:0}

/* ─── Empty ─── */
.empty{
  text-align:center;color:var(--muted);padding:40px 20px;
}
.empty .ball{font-size:32px;margin-bottom:8px;opacity:0.4}

/* ─── Tabs nav ─── */
nav.tabs{
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  background:rgba(10,20,16,0.95);backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-top:1px solid var(--line);
  padding:8px 0 max(8px,env(safe-area-inset-bottom));
  display:flex;justify-content:space-around;
}
.tab{
  flex:1;background:none;border:none;color:var(--muted);font-family:inherit;
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;
  cursor:pointer;padding:6px 4px;display:flex;flex-direction:column;align-items:center;gap:4px;
}
.tab.on{color:var(--gold)}
.tab svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ─── Modal edición ─── */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;
  display:none;align-items:flex-end;justify-content:center;
}
.modal-bg.show{display:flex}
.modal{
  background:var(--card2);border-radius:18px 18px 0 0;padding:20px;width:100%;max-width:480px;
  border-top:1px solid var(--line);max-height:90vh;overflow-y:auto;
  padding-bottom:max(20px,env(safe-area-inset-bottom));
}
.modal h3{margin-bottom:4px;font-size:18px}
.modal .sub{color:var(--muted);font-size:13px;margin-bottom:18px}
.score-edit{display:flex;align-items:center;justify-content:center;gap:14px;margin:20px 0}
.score-edit input{
  width:60px;height:60px;text-align:center;font-size:28px;font-weight:800;
  background:var(--card);border:2px solid var(--line);color:var(--chalk);border-radius:12px;
  font-family:inherit;font-variant-numeric:tabular-nums;
}
.score-edit input:focus{outline:none;border-color:var(--gold)}
.team-edit{flex:1;text-align:center;font-weight:700;font-size:14px}
.modal-actions{display:flex;gap:8px;margin-top:18px}
.btn{
  flex:1;padding:12px;border-radius:10px;font-family:inherit;font-weight:700;font-size:14px;
  border:none;cursor:pointer;
}
.btn-primary{background:var(--gold);color:#1a1408}
.btn-ghost{background:var(--line);color:var(--chalk)}
.btn-danger{background:rgba(224,49,46,0.15);color:#ff8a87}

/* Hide section by default */
section{display:none}
section.on{display:block}
body{padding-top:env(safe-area-inset-top)}
header{padding-top:calc(14px + env(safe-area-inset-top))}

/* ─── Modal Favoritos ─── */
.fav-grid{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;max-height:50vh;overflow-y:auto;padding:2px}
.fav-tbtn{
  border:1px solid var(--line);background:var(--card);color:var(--chalk);border-radius:16px;
  padding:0 12px;height:32px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;
  display:inline-flex;align-items:center;gap:6px;line-height:1;white-space:nowrap;
}
.fav-tbtn .flag{font-size:15px;line-height:1}
.fav-tbtn.sel-0{background:var(--esp);border-color:var(--esp);color:#fff}
.fav-tbtn.sel-1{background:var(--uru);border-color:var(--uru);color:#0a1410}
.fav-tbtn.sel-2{background:var(--gold);border-color:var(--gold);color:#1a1408}
.fav-info{color:var(--muted);font-size:12px;margin-bottom:10px}
.fav-info.warn{color:var(--gold)}

</style>

  1:[2,0], 2:[2,1], 7:[1,1], 8:[1,1], 13:[1,1], 14:[0,1], 19:[4,1], 20:[2,0], 25:[7,1], 26:[1,0], 31:[2,2], 32:[5,1],
};

// Mapeo nombres openfootball EN → claves k del JS
const KEY_MAP = {};
MATCHES.forEach(m=>{
  if(!m.h.p) KEY_MAP[m.h.k]=m.h.k;
  if(!m.a.p) KEY_MAP[m.a.k]=m.a.k;
});

const DEFAULT_FAVS = ['Spain','Uruguay','Canada'];
function favSlot(teamKey){
  // devuelve 0,1,2 si el equipo está en favs, o -1
  return (state.favs || []).indexOf(teamKey);
}
const PHASE_LABELS={
  r32:{name:'Dieciseisavos de final',dates:'28 jun – 4 jul'},
  r16:{name:'Octavos de final',dates:'4 – 7 jul'},
  qf:{name:'Cuartos de final',dates:'9 – 12 jul'},
  sf:{name:'Semifinales',dates:'14 – 15 jul'},
  '3p':{name:'Tercer puesto',dates:'18 jul'},
  fn:{name:'Final',dates:'19 jul'},
};

// ═══════ ESTADO ═══════
const STORAGE_KEY='mundial2026_v2';
let state = loadState();
let activeFilters = new Set();
let activeView='agenda';
let editingId=null;

function loadState(){
  try{
    const s=JSON.parse(localStorage.getItem(STORAGE_KEY));
    if(s && s.results){
      if(!Array.isArray(s.favs)) s.favs = [...DEFAULT_FAVS];
      if(!s.manual) s.manual = {};
      return s;
    }
  }catch(e){}
  return {results: {...PRELOADED}, manual:{}, favs:[...DEFAULT_FAVS]};
}
function saveState(){
  try{localStorage.setItem(STORAGE_KEY, JSON.stringify(state));}catch(e){}
}

// ═══════ HELPERS ═══════
const DOW=['dom','lun','mar','mié','jue','vie','sáb'];
const MONTHS=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

function dateLabel(iso){
  const [y,m,d] = iso.split('-').map(Number);
  const dt = new Date(y,m-1,d);
  return `${DOW[dt.getDay()]} ${d} ${MONTHS[m-1]}`;
}
function todayISO(){
  const n = new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
}
function isMoon(m){
  // empieza entre 13:00 y 22:00 hora española → termina antes de 24:00
  const [h]=m.t.split(':').map(Number);
  return h>=13 && h<=22;
}
function favSlotsInMatch(m){
  // devuelve array de slots (0,1,2) cuyo equipo aparece en el partido
  if(m.h.p || m.a.p) return [];
  const r = [];
  const f = state.favs || [];
  if(f.indexOf(m.h.k) >= 0) r.push(f.indexOf(m.h.k));
  if(f.indexOf(m.a.k) >= 0) r.push(f.indexOf(m.a.k));
  return [...new Set(r)];
}
function isFav(m){
  return favSlotsInMatch(m).length > 0;
}
function getResult(id){
  return state.results[id];
}
function isPlayed(id){
  return !!getResult(id);
}

function renderTeam(team){
  if(team.p){
    return `<div class="team-row"><span class="team-name placeholder">${team.n}</span></div>`;
  }
  return `<div class="team-row">
    <span class="team-name">${team.n}<span class="code">${team.c}</span></span>
  </div>`;
}

function matchCard(m){
  const r = getResult(m.id);
  const played = !!r;
  const classes = ['match'];
  if(played) classes.push('played');
  favSlotsInMatch(m).forEach(s => classes.push('fav-slot-'+s));

  const t1 = m.h, t2 = m.a;
  const loser1 = played && r[0]<r[1];
  const loser2 = played && r[1]<r[0];

  let venueLine = '';
  if(m.g) venueLine = `<span class="grp">Grupo ${m.g}</span>${m.v.c} · ${m.v.s}`;
  else venueLine = `${m.v.c} · ${m.v.s}`;

  const moonChip = isMoon(m) ? `<div class="moon">🌙</div>` : '';

  const teamHTML = (t) => {
    if(t.p) return `<span class="team-name placeholder"><span class="nm">${t.n}</span></span>`;
    return `<span class="team-name"><span class="flag">${flag(t.k)}</span><span class="nm">${t.n}</span><span class="code">${t.c}</span></span>`;
  };

  return `<div class="${classes.join(' ')}" data-id="${m.id}">
    <div class="time-col">
      <div class="time">${m.t}</div>
      ${moonChip}
    </div>
    <div class="teams">
      <div class="team-row ${loser1?'loser':''}">
        ${teamHTML(t1)}
        ${played ? `<span class="score">${r[0]}</span>` : ''}
      </div>
      <div class="team-row ${loser2?'loser':''}">
        ${teamHTML(t2)}
        ${played ? `<span class="score">${r[1]}</span>` : '<span class="no-score">—</span>'}
      </div>
      <div class="venue">${venueLine}</div>
    </div>
  </div>`;
}

function filterMatches(matches){
  let f = matches.slice();
  if(activeFilters.has('today')){
    const td = todayISO();
    f = f.filter(m=>m.d===td);
  }
  if(activeFilters.has('moon')) f = f.filter(isMoon);
  // Filtros por slot de favorito (fav0, fav1, fav2)
  for(let s=0; s<3; s++){
    if(activeFilters.has('fav'+s)){
      const teamK = state.favs[s];
      if(teamK){
        f = f.filter(m => !m.h.p && !m.a.p && (m.h.k===teamK || m.a.k===teamK));
      }
    }
  }
  return f;
}

// ═══════ VISTAS ═══════
function renderAgenda(){
  const el = document.getElementById('agenda');
  const list = filterMatches(MATCHES);
  if(list.length===0){
    el.innerHTML = `<div class="empty"><div class="ball">⚽</div>No hay partidos con estos filtros.</div>`;
    return;
  }
  const td = todayISO();
  const byDay = {};
  list.forEach(m=>{
    (byDay[m.d]=byDay[m.d]||[]).push(m);
  });
  let html = '';
  Object.keys(byDay).sort().forEach(d=>{
    const isTd = d===td;
    html += `<div class="day">
      <div class="day-h ${isTd?'today':''}"><span class="dot"></span>${dateLabel(d)}${isTd?' · Hoy':''}</div>`;
    byDay[d].forEach(m=>{ html += matchCard(m); });
    html += `</div>`;
  });
  el.innerHTML = html;
  bindCards();
}

function renderGrupos(){
  const el = document.getElementById('grupos');
  const groups = {};
  MATCHES.filter(m=>m.ph==='group').forEach(m=>{
    if(!groups[m.g]) groups[m.g] = {teams:{}, matches:[]};
    groups[m.g].matches.push(m);
    [m.h, m.a].forEach(t=>{
      if(!groups[m.g].teams[t.k]) groups[m.g].teams[t.k] = {n:t.n,c:t.c,k:t.k,pj:0,g:0,e:0,p:0,gf:0,gc:0,pt:0};
    });
  });

  Object.keys(groups).forEach(gKey=>{
    const g = groups[gKey];
    g.matches.forEach(m=>{
      const r = getResult(m.id);
      if(!r) return;
      const h = g.teams[m.h.k], a = g.teams[m.a.k];
      h.pj++; a.pj++;
      h.gf += r[0]; h.gc += r[1];
      a.gf += r[1]; a.gc += r[0];
      if(r[0]>r[1]){h.g++; a.p++; h.pt+=3;}
      else if(r[0]<r[1]){a.g++; h.p++; a.pt+=3;}
      else {h.e++; a.e++; h.pt++; a.pt++;}
    });
  });

  let html = '<div class="groups-grid">';
  Object.keys(groups).sort().forEach(gKey=>{
    const teams = Object.values(groups[gKey].teams).sort((x,y)=>{
      if(y.pt!==x.pt) return y.pt-x.pt;
      const dx=x.gf-x.gc, dy=y.gf-y.gc;
      if(dy!==dx) return dy-dx;
      return y.gf-x.gf;
    });
    html += `<div class="group-card">
      <div class="group-title">Grupo ${gKey}</div>
      <table class="group-table">
        <thead><tr><th>Equipo</th><th>PJ</th><th>DG</th><th class="pts">PT</th></tr></thead>
        <tbody>`;
    teams.forEach((t,i)=>{
      const dg = t.gf-t.gc;
      const dgStr = dg>0?`+${dg}`:dg;
      const slot = favSlot(t.k);
      const favCls = slot>=0 ? 'fav-slot-'+slot : '';
      html += `<tr class="${i<2?'qualified':''} ${favCls}">
        <td><span class="flag">${flag(t.k)}</span>${t.n}</td><td>${t.pj}</td><td>${dgStr}</td><td class="pts">${t.pt}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  });
  html += '</div>';
  el.innerHTML = html;
}

function renderFinal(){
  const el = document.getElementById('final');
  const phases = ['r32','r16','qf','sf','3p','fn'];
  let html = '';
  phases.forEach(ph=>{
    const ms = MATCHES.filter(m=>m.ph===ph);
    const lbl = PHASE_LABELS[ph];
    html += `<div class="ko-phase">
      <div class="ko-title">
        <span>${lbl.name}</span>
        <span class="ko-dates">${lbl.dates}</span>
      </div>`;
    const byDay = {};
    ms.forEach(m=>{ (byDay[m.d]=byDay[m.d]||[]).push(m); });
    Object.keys(byDay).sort().forEach(d=>{
      html += `<div class="day">
        <div class="day-h"><span class="dot"></span>${dateLabel(d)}</div>`;
      byDay[d].forEach(m=>{ html += matchCard(m); });
      html += `</div>`;
    });
    html += `</div>`;
  });
  el.innerHTML = html;
  bindCards();
}

function render(){
  if(activeView==='agenda') renderAgenda();
  else if(activeView==='grupos') renderGrupos();
  else if(activeView==='final') renderFinal();
}

// ═══════ MODAL EDICIÓN ═══════
function bindCards(){
  document.querySelectorAll('.match').forEach(el=>{
    el.addEventListener('click', ()=>{
      const id = parseInt(el.dataset.id);
      openEdit(id);
    });
  });
}
function openEdit(id){
  const m = MATCHES.find(x=>x.id===id);
  if(!m) return;
  if(m.h.p || m.a.p){
    showStatus('Este partido aún no tiene equipos confirmados.','info');
    return;
  }
  editingId = id;
  const r = getResult(id);
  document.getElementById('modalT1').textContent = `${m.h.n} (${m.h.c})`;
  document.getElementById('modalT2').textContent = `${m.a.n} (${m.a.c})`;
  document.getElementById('modalSub').textContent = `${dateLabel(m.d)} · ${m.t} · ${m.v.c}`;
  document.getElementById('modalH').value = r?r[0]:'';
  document.getElementById('modalA').value = r?r[1]:'';
  document.getElementById('modal').classList.add('show');
}
function closeEdit(){
  document.getElementById('modal').classList.remove('show');
  editingId = null;
}
document.getElementById('modalCancel').onclick = closeEdit;
document.getElementById('modal').addEventListener('click', e=>{
  if(e.target.id==='modal') closeEdit();
});
document.getElementById('modalSave').onclick = ()=>{
  const h = parseInt(document.getElementById('modalH').value);
  const a = parseInt(document.getElementById('modalA').value);
  if(isNaN(h)||isNaN(a)||h<0||a<0){
    showStatus('Marcadores no válidos.','error');
    return;
  }
  state.results[editingId] = [h,a];
  state.manual[editingId] = true;
  saveState();
  closeEdit();
  render();
};
document.getElementById('modalClear').onclick = ()=>{
  delete state.results[editingId];
  delete state.manual[editingId];
  saveState();
  closeEdit();
  render();
};

// ═══════ ACTUALIZAR DESDE OPENFOOTBALL ═══════
// Varias rutas que sirven el mismo archivo. Probamos en orden hasta que una responda.
const FEED_URLS = [
  'https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json',
  'https://cdn.jsdelivr.net/gh/openfootball/worldcup.json@master/2026/worldcup.json',
  'https://cdn.statically.io/gh/openfootball/worldcup.json/master/2026/worldcup.json',
];

async function fetchFeed(){
  let lastErr;
  for(const url of FEED_URLS){
    try{
      const res = await fetch(url + (url.includes('?')?'&':'?') + '_=' + Date.now(), {cache:'no-store'});
      if(!res.ok){ lastErr = new Error('HTTP '+res.status); continue; }
      return await res.json();
    } catch(e){
      lastErr = e;
    }
  }
  throw lastErr || new Error('Sin conexión');
}

async function syncResults(silent){
  const btn = document.getElementById('syncBtn');
  btn.disabled = true;
  btn.classList.add('loading');
  if(!silent) showStatus('Buscando resultados…','info');

  try{
    const data = await fetchFeed();

    let added=0, updated=0;
    data.matches.forEach(fm=>{
      if(!fm.score || !fm.score.ft) return;
      const ft = fm.score.ft;
      const found = MATCHES.find(m =>
        !m.h.p && !m.a.p &&
        m.h.k === fm.team1 && m.a.k === fm.team2
      );
      if(!found) return;
      if(state.manual[found.id]) return;
      const prev = state.results[found.id];
      if(!prev){ added++; state.results[found.id] = [ft[0],ft[1]]; }
      else if(prev[0]!==ft[0] || prev[1]!==ft[1]){
        updated++; state.results[found.id] = [ft[0],ft[1]];
      }
    });

    saveState();
    render();

    if(silent){
      if(added+updated>0){
        showStatus(`✓ ${added+updated} resultado${added+updated>1?'s':''} al día`,'ok');
      }
    } else {
      if(added+updated===0){
        showStatus('Todo al día. No hay nuevos resultados.','ok');
      } else {
        const parts = [];
        if(added) parts.push(`${added} nuevo${added>1?'s':''}`);
        if(updated) parts.push(`${updated} actualizado${updated>1?'s':''}`);
        showStatus(`✓ ${parts.join(' · ')}`,'ok');
      }
    }
  } catch(e){
    console.error('Sync error:',e);
    // Solo molestar al usuario si lo pidió él (pulsando el botón).
    // En auto-sync de inicio, fallar en silencio: los pre-cargados ya están al día.
    if(!silent){
      const msg = (location.protocol==='file:')
        ? 'Abre la app desde la web (no como archivo) para poder actualizar resultados.'
        : 'Sin conexión a openfootball. Vuelve a intentarlo en un momento, o introdúcelos a mano tocando cada partido.';
      showStatus(msg,'error');
    }
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
  }
}
document.getElementById('syncBtn').onclick = ()=>syncResults(false);

let statusTimer;
function showStatus(msg, type){
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status show '+(type||'');
  clearTimeout(statusTimer);
  statusTimer = setTimeout(()=>el.classList.remove('show'), type==='error'?7000:4000);
}

// ═══════ FILTROS Y TABS ═══════
document.querySelectorAll('.chip').forEach(c=>{
  c.onclick = ()=>{
    const f = c.dataset.filter;
    if(activeFilters.has(f)){
      activeFilters.delete(f);
      c.classList.remove('on');
    } else {
      activeFilters.add(f);
      c.classList.add('on');
    }
    if(activeView!=='agenda'){
      activeView='agenda';
      updateTabs();
    }
    render();
  };
});
function updateTabs(){
  document.querySelectorAll('.tab').forEach(t=>{
    t.classList.toggle('on', t.dataset.view===activeView);
  });
  document.querySelectorAll('section').forEach(s=>{
    s.classList.toggle('on', s.dataset.view===activeView);
  });
}
document.querySelectorAll('.tab').forEach(t=>{
  t.onclick = ()=>{
    activeView = t.dataset.view;
    updateTabs();
    render();
    window.scrollTo(0,0);
  };
});


// ═══════ FAVORITOS DINÁMICOS ═══════
const ALL_TEAMS = (() => {
  const seen = new Set();
  const out = [];
  MATCHES.forEach(m => {
    [m.h, m.a].forEach(t => {
      if(!t.p && !seen.has(t.k)){
        seen.add(t.k);
        out.push({k:t.k, n:t.n});
      }
    });
  });
  return out.sort((a,b)=>a.n.localeCompare(b.n,'es'));
})();

function renderFavChips(){
  const cont = document.getElementById('favChips');
  let html = '';
  (state.favs || []).forEach((k, idx) => {
    if(!k) return;
    const team = ALL_TEAMS.find(t => t.k === k);
    if(!team) return;
    const on = activeFilters.has('fav'+idx) ? 'on' : '';
    html += `<button class="chip fav-slot-${idx} ${on}" data-filter="fav${idx}"><span class="flag">${flag(k)}</span>${team.n}</button>`;
  });
  cont.innerHTML = html;
  // Re-bind para los nuevos chips
  cont.querySelectorAll('.chip').forEach(c => {
    c.onclick = ()=>{
      const f = c.dataset.filter;
      if(activeFilters.has(f)){ activeFilters.delete(f); c.classList.remove('on'); }
      else { activeFilters.add(f); c.classList.add('on'); }
      if(activeView!=='agenda'){ activeView='agenda'; updateTabs(); }
      render();
    };
  });
}

let favSelection = [];
function openFavModal(){
  favSelection = [...(state.favs || [])];
  const grid = document.getElementById('favGrid');
  grid.innerHTML = ALL_TEAMS.map(t => {
    const slot = favSelection.indexOf(t.k);
    const cls = slot >= 0 ? 'sel-'+slot : '';
    return `<button class="fav-tbtn ${cls}" data-k="${t.k}"><span class="flag">${flag(t.k)}</span>${t.n}</button>`;
  }).join('');
  updateFavInfo();
  grid.querySelectorAll('.fav-tbtn').forEach(b => {
    b.onclick = () => {
      const k = b.dataset.k;
      const idx = favSelection.indexOf(k);
      if(idx >= 0){
        favSelection.splice(idx, 1);
      } else if(favSelection.length >= 3){
        const info = document.getElementById('favInfo');
        info.textContent = '⚠️ Máximo 3 equipos. Quita uno para añadir otro.';
        info.classList.add('warn');
        setTimeout(updateFavInfo, 1800);
        return;
      } else {
        favSelection.push(k);
      }
      // Repintar selecciones
      grid.querySelectorAll('.fav-tbtn').forEach(bt => {
        const s = favSelection.indexOf(bt.dataset.k);
        bt.className = 'fav-tbtn' + (s>=0 ? ' sel-'+s : '');
      });
      updateFavInfo();
    };
  });
  document.getElementById('favModal').classList.add('show');
}
function updateFavInfo(){
  const info = document.getElementById('favInfo');
  info.classList.remove('warn');
  const n = favSelection.length;
  info.textContent = n === 0 ? 'Elige hasta 3 equipos' :
    n === 3 ? '3 elegidos · toca uno para quitarlo' :
    `${n} elegido${n>1?'s':''} · puedes añadir ${3-n} más`;
}
function closeFavModal(){
  document.getElementById('favModal').classList.remove('show');
}
document.getElementById('favPickBtn').onclick = openFavModal;
document.getElementById('favCancel').onclick = closeFavModal;
document.getElementById('favModal').addEventListener('click', e => {
  if(e.target.id === 'favModal') closeFavModal();
});
document.getElementById('favSave').onclick = () => {
  state.favs = favSelection.slice(0, 3);
  // Limpiar filtros de slots vacíos
  for(let s=0; s<3; s++){
    if(!state.favs[s]) activeFilters.delete('fav'+s);
  }
  saveState();
  closeFavModal();
  renderFavChips();
  render();
};

// ═══════ INIT ═══════
renderFavChips();
render();

// Auto-sync al abrir, suave y silencioso (los pre-cargados ya cubren lo importante).
if(navigator.onLine){
  setTimeout(()=>syncResults(true), 800);
}
</script>
