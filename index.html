<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Mundial 2026 · Hora Española</title>
<style>
:root{
  --pitch:#0c1611; --card:#13231a; --card2:#182b20; --line:#26412f;
  --chalk:#eef3ea; --muted:#8fa698;
  --esp:#e0312e; --esp2:#f2c14e;
  --uru:#6cbde8;
  --can:#e8453c;
  --moon:#f2e9c0;
  --live:#58d68d;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--pitch);color:var(--chalk);font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;padding-bottom:90px;}
.mono{font-family:ui-monospace,'Roboto Mono',monospace}

header{position:sticky;top:0;z-index:30;background:linear-gradient(180deg,#0c1611 75%,rgba(12,22,17,0));padding:14px 14px 8px}
h1{font-size:21px;font-weight:800;letter-spacing:-.3px}
h1 span{color:var(--esp2)}
.sub{font-size:12px;color:var(--muted);margin-top:2px}

.chips{display:flex;gap:7px;overflow-x:auto;padding:10px 0 6px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;border:1px solid var(--line);background:var(--card);color:var(--chalk);border-radius:999px;padding:7px 13px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer}
.chip.on{background:var(--chalk);color:#0c1611;border-color:var(--chalk)}
.chip.on.c-esp{background:var(--esp);color:#fff;border-color:var(--esp)}
.chip.on.c-uru{background:var(--uru);color:#06222f;border-color:var(--uru)}
.chip.on.c-can{background:var(--can);color:#fff;border-color:var(--can)}
.chip.on.c-moon{background:var(--moon);color:#3a3110;border-color:var(--moon)}

.bar{display:flex;gap:8px;padding:0 14px 4px}
.btn{flex:1;border:1px solid var(--line);background:var(--card);color:var(--chalk);border-radius:12px;padding:11px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer}
.btn.primary{background:var(--esp2);color:#241c05;border-color:var(--esp2)}
.btn:disabled{opacity:.55}

.note{margin:8px 14px;padding:10px 12px;border-radius:12px;font-size:13px;line-height:1.45;display:none}
.note.ok{display:block;background:#15301f;border:1px solid #2d5c3c}
.note.err{display:block;background:#331a18;border:1px solid #6b3430}

.dayhead{padding:18px 16px 8px;font-size:13px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.dayhead em{font-style:normal;color:var(--chalk)}

.match{position:relative;margin:0 12px 9px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 12px 12px 16px;cursor:pointer;overflow:hidden}
.match .stripe{position:absolute;left:0;top:0;bottom:0;width:5px}
.s-esp .stripe{background:linear-gradient(180deg,var(--esp) 0 33%,var(--esp2) 33% 66%,var(--esp) 66%)}
.s-uru .stripe{background:var(--uru)}
.s-can .stripe{background:var(--can)}
.s-esp.s-uru .stripe{background:linear-gradient(180deg,var(--esp) 0 50%,var(--uru) 50%)}
.topline{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--muted);margin-bottom:7px}
.time{font-weight:600;color:var(--chalk);font-size:12.5px;background:var(--card2);border:1px solid var(--line);border-radius:7px;padding:2px 7px}
.badge{font-size:10.5px;font-weight:800;letter-spacing:.05em;border-radius:7px;padding:2.5px 7px}
.b-moon{background:rgba(242,233,192,.14);color:var(--moon);border:1px solid rgba(242,233,192,.3)}
.b-esp{background:rgba(224,49,46,.16);color:#ff8d80;border:1px solid rgba(224,49,46,.45)}
.b-uru{background:rgba(108,189,232,.14);color:var(--uru);border:1px solid rgba(108,189,232,.4)}
.b-can{background:rgba(232,69,60,.14);color:#ff9a87;border:1px solid rgba(232,69,60,.4)}
.b-fin{background:rgba(88,214,141,.13);color:var(--live);border:1px solid rgba(88,214,141,.35)}
.row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}
.teams{min-width:0}
.team{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:700;padding:2.5px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.team .fl{font-size:17px;width:24px;flex:0 0 24px;text-align:center}
.team.win{color:#fff}
.team.lose{color:var(--muted);font-weight:600}
.score{display:flex;flex-direction:column;align-items:center;gap:3px}
.score .g{font-size:18px;font-weight:600;background:var(--card2);border:1px solid var(--line);border-radius:9px;min-width:38px;text-align:center;padding:1px 6px}
.score .g.empty{color:var(--muted);font-size:13px;padding:5px 6px}
.venue{margin-top:7px;font-size:11.5px;color:var(--muted)}

.empty{padding:60px 30px;text-align:center;color:var(--muted);font-size:15px;line-height:1.6}

/* grupos */
.gwrap{padding:6px 12px}
.gcard{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:10px;padding:12px 14px}
.gcard h3{font-size:14px;font-weight:800;letter-spacing:.08em;margin-bottom:8px;color:var(--esp2)}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{font-size:10.5px;color:var(--muted);text-align:right;font-weight:700;padding:2px 4px}
th:first-child{text-align:left}
td{padding:4px;text-align:right;border-top:1px solid var(--line)}
td:first-child{text-align:left;font-weight:700}
td.pts{font-weight:600;color:var(--esp2)}

/* modal */
.ovl{position:fixed;inset:0;background:rgba(4,8,6,.72);display:none;align-items:flex-end;z-index:50}
.ovl.show{display:flex}
.sheet{background:var(--card2);border-top:1px solid var(--line);border-radius:20px 20px 0 0;width:100%;padding:20px 18px calc(22px + env(safe-area-inset-bottom))}
.sheet h2{font-size:17px;font-weight:800;margin-bottom:4px}
.sheet .m{font-size:12.5px;color:var(--muted);margin-bottom:16px}
.frow{display:grid;grid-template-columns:1fr 64px;gap:10px;align-items:center;margin-bottom:10px}
.frow input[type=text]{background:var(--card);border:1px solid var(--line);color:var(--chalk);border-radius:10px;padding:11px;font-size:15px;font-family:inherit;width:100%}
.frow input[type=number]{background:var(--card);border:1px solid var(--line);color:var(--chalk);border-radius:10px;padding:11px 6px;font-size:20px;text-align:center;width:100%;font-family:ui-monospace,'Roboto Mono',monospace}
.sheet .acts{display:flex;gap:9px;margin-top:14px}
.sheet .acts .btn{padding:13px}
.btn.ghost{background:transparent}
.btn.danger{background:transparent;color:#ff8d80;border-color:#6b3430;flex:0 0 auto;padding:13px 14px}

.tgrid{display:flex;flex-wrap:wrap;gap:7px;max-height:46vh;overflow-y:auto;padding:2px;margin-bottom:4px}
.tbtn{border:1px solid var(--line);background:var(--card);color:var(--chalk);border-radius:999px;padding:7px 11px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer}
.tbtn.sel{background:var(--esp2);color:#241c05;border-color:var(--esp2)}

.spin{display:inline-block;width:14px;height:14px;border:2px solid #241c05;border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
@media (prefers-reduced-motion:reduce){.spin{animation:none}}
</style>
</head>

[102,"2026-07-15T21:00","Ganador P99","Ganador P100","Semifinal 2","Mercedes-Benz Stadium","Atlanta"],
[103,"2026-07-18T23:00","Perdedor SF1","Perdedor SF2","Tercer puesto","Hard Rock Stadium","Miami"],
[104,"2026-07-19T21:00","Ganador SF1","Ganador SF2","FINAL","MetLife Stadium","Nueva York/NJ"]
].map(r=>({id:r[0],dt:r[1],h:r[2],a:r[3],ph:r[4],st:r[5],ci:r[6]}));

const GROUP_TEAMS={A:["México","Sudáfrica","Corea del Sur","Chequia"],B:["Canadá","Bosnia","Catar","Suiza"],C:["Brasil","Marruecos","Haití","Escocia"],D:["EE. UU.","Paraguay","Australia","Turquía"],E:["Alemania","Curazao","Costa de Marfil","Ecuador"],F:["Países Bajos","Japón","Suecia","Túnez"],G:["Bélgica","Egipto","Irán","Nueva Zelanda"],H:["España","Cabo Verde","Arabia Saudí","Uruguay"],I:["Francia","Senegal","Irak","Noruega"],J:["Argentina","Argelia","Austria","Jordania"],K:["Portugal","RD Congo","Uzbekistán","Colombia"],L:["Inglaterra","Croacia","Ghana","Panamá"]};

/* Resultados iniciales (jornada 1 ya jugada) */
const SEED={1:{h:2,a:0},2:{h:2,a:1}};

/* ====== ESTADO ====== */
const DEF_FAVS=["España","Uruguay","Canadá"];
let state={results:{...SEED},names:{},favs:[...DEF_FAVS]};
let filter="all", view="list";
const KEY="wc26-v1";

async function load(){
  try{const r=localStorage.getItem(KEY); if(r){const s=JSON.parse(r); state={results:{...SEED,...(s.results||{})},names:s.names||{},favs:(Array.isArray(s.favs)&&s.favs.length?s.favs.slice(0,3):[...DEF_FAVS])};}}
  catch(e){}
  render();
}
async function save(){
  try{localStorage.setItem(KEY,JSON.stringify(state));}
  catch(e){note("No se pudo guardar en el almacenamiento. El cambio se mantiene solo en esta sesión.",true);}
}

/* ====== HELPERS ====== */
function teamName(m,side){const o=state.names[m.id];return (o&&o[side])||(side==="h"?m.h:m.a);}
function isTeam(m,name){return teamName(m,"h")===name||teamName(m,"a")===name;}
function nightOk(m){const h=+m.dt.slice(11,13);return h>=12&&h<=22;} /* empieza con luz del día ES y acaba a las 24:00 como tarde */
function res(m){return state.results[m.id];}
function fmtDay(d){
  const days=["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];
  const months=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
  const dt=new Date(d+"T12:00:00");
  return days[dt.getDay()].charAt(0).toUpperCase()+days[dt.getDay()].slice(1)+" "+dt.getDate()+" de "+months[dt.getMonth()];
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function note(msg,err){const n=document.getElementById("note");n.textContent=msg;n.className="note "+(err?"err":"ok");clearTimeout(note.t);note.t=setTimeout(()=>{n.className="note";},7000);}

/* ====== FAVORITOS Y FILTROS ====== */
const SLOT=["#e0312e","#6cbde8","#f2c14e"]; /* color propio de cada favorito (1º, 2º, 3º) */
function favIdx(name){return state.favs.findIndex(f=>canon(f)===canon(name));}
function matchFavs(m){const out=[];for(const side of["h","a"]){const i=favIdx(teamName(m,side));if(i>=0&&!out.some(o=>o.i===i))out.push({n:state.favs[i],i:i});}return out;}
function chipsDef(){
  const c=[{id:"all",label:"Todos"}];
  state.favs.forEach((f,i)=>c.push({id:"fav:"+f,label:fl(f)+" "+f,color:SLOT[i]}));
  c.push({id:"night",label:"🌙 Acaban antes de las 24:00",color:"#bfb58a"});
  c.push({id:"today",label:"📅 Hoy"});
  c.push({id:"pick",label:"⭐ Elegir favoritos"});
  return c;
}
function passes(m){
  if(filter==="all")return true;
  if(filter==="night")return nightOk(m);
  if(filter==="today"){const t=new Date();const today=t.getFullYear()+"-"+String(t.getMonth()+1).padStart(2,"0")+"-"+String(t.getDate()).padStart(2,"0");return m.dt.slice(0,10)===today;}
  if(filter.indexOf("fav:")===0){const c=canon(filter.slice(4));return canon(teamName(m,"h"))===c||canon(teamName(m,"a"))===c;}
  return true;
}

/* ====== RENDER ====== */
function render(){
  document.getElementById("tabBtn").textContent=view==="list"?"📊 Grupos":"📋 Calendario";
  const ch=document.getElementById("chips");
  ch.innerHTML=chipsDef().map(c=>{
    const on=filter===c.id;
    const st=on&&c.color?` style="background:${c.color};color:#101810;border-color:${c.color}"`:"";
    return `<button class="chip ${on?"on":""}" data-f="${esc(c.id)}"${st}>${c.label}</button>`;
  }).join("");
  ch.querySelectorAll(".chip").forEach(b=>b.onclick=()=>{const f=b.dataset.f;if(f==="pick"){openFavs();return;}filter=f;view="list";render();});
  const list=document.getElementById("list");
  if(view==="groups"){list.innerHTML=renderGroups();return;}

  const ms=M.filter(passes).sort((a,b)=>a.dt<b.dt?-1:1);
  if(!ms.length){list.innerHTML=`<div class="empty">No hay partidos con este filtro.<br>Prueba con otro.</div>`;return;}
  let html="",lastDay="";
  for(const m of ms){
    const day=m.dt.slice(0,10);
    if(day!==lastDay){lastDay=day;html+=`<div class="dayhead"><em>${fmtDay(day)}</em></div>`;}
    html+=card(m);
  }
  list.innerHTML=html;
  list.querySelectorAll(".match").forEach(el=>el.onclick=()=>openEdit(+el.dataset.id));
}

function card(m){
  const hN=teamName(m,"h"),aN=teamName(m,"a"),r=res(m);
  const cls=["match"];
  const badges=[];
  const fv=matchFavs(m);
  let stripeStyle="";
  if(fv.length===1)stripeStyle=` style="background:${SLOT[fv[0].i]}"`;
  else if(fv.length>=2)stripeStyle=` style="background:linear-gradient(180deg,${SLOT[fv[0].i]} 0 50%,${SLOT[fv[1].i]} 50%)"`;
  fv.forEach(o=>badges.push(`<span class="badge" style="background:${SLOT[o.i]}22;color:${SLOT[o.i]};border:1px solid ${SLOT[o.i]}66">${esc(o.n.toUpperCase())}</span>`));
  if(nightOk(m))badges.push('<span class="badge b-moon">🌙 acaba ≤ 24:00</span>');
  if(r)badges.push('<span class="badge b-fin">FINAL</span>');
  let hCls="team",aCls="team";
  if(r){if(r.h>r.a){hCls+=" win";aCls+=" lose";}else if(r.a>r.h){aCls+=" win";hCls+=" lose";}}
  return `<div class="${cls.join(" ")}" data-id="${m.id}">
    <div class="stripe"${stripeStyle}></div>
    <div class="topline"><span class="time mono">${m.dt.slice(11,16)}</span><span>${esc(m.ph)}</span>${badges.join("")}</div>
    <div class="row">
      <div class="teams">
        <div class="${hCls}"><span class="fl">${fl(hN)}</span>${esc(hN)}</div>
        <div class="${aCls}"><span class="fl">${fl(aN)}</span>${esc(aN)}</div>
      </div>
      <div class="score">
        ${r?`<span class="g mono">${r.h}</span><span class="g mono">${r.a}</span>`:`<span class="g empty">vs</span>`}
      </div>
    </div>
    <div class="venue">${esc(m.st)} · ${esc(m.ci)}</div>
  </div>`;
}

function renderGroups(){
  let html='<div class="gwrap">';
  for(const g of Object.keys(GROUP_TEAMS)){
    const t={};GROUP_TEAMS[g].forEach(n=>t[n]={pj:0,pts:0,gf:0,gc:0});
    M.filter(m=>m.ph==="Grupo "+g).forEach(m=>{
      const r=res(m);if(!r)return;
      t[m.h].pj++;t[m.a].pj++;t[m.h].gf+=r.h;t[m.h].gc+=r.a;t[m.a].gf+=r.a;t[m.a].gc+=r.h;
      if(r.h>r.a)t[m.h].pts+=3;else if(r.a>r.h)t[m.a].pts+=3;else{t[m.h].pts++;t[m.a].pts++;}
    });
    const rows=Object.entries(t).sort((x,y)=>y[1].pts-x[1].pts||(y[1].gf-y[1].gc)-(x[1].gf-x[1].gc)||y[1].gf-x[1].gf);
    html+=`<div class="gcard"><h3>GRUPO ${g}</h3><table><tr><th>Equipo</th><th>PJ</th><th>GF</th><th>GC</th><th>Pts</th></tr>`;
    for(const[n,s]of rows)html+=`<tr><td>${fl(n)} ${esc(n)}</td><td>${s.pj}</td><td>${s.gf}</td><td>${s.gc}</td><td class="pts">${s.pts}</td></tr>`;
    html+="</table></div>";
  }
  return html+"</div>";
}

/* ====== EDICIÓN ====== */
let editing=null;
function openEdit(id){
  editing=M.find(m=>m.id===id);const m=editing,r=res(m);
  document.getElementById("mTitle").textContent=m.ph;
  document.getElementById("mMeta").textContent=fmtDay(m.dt.slice(0,10))+" · "+m.dt.slice(11,16)+" (hora española) · "+m.st;
  document.getElementById("hName").value=teamName(m,"h");
  document.getElementById("aName").value=teamName(m,"a");
  const ko=m.id>=73;
  document.getElementById("hName").readOnly=!ko;document.getElementById("aName").readOnly=!ko;
  document.getElementById("hGoals").value=r?r.h:"";
  document.getElementById("aGoals").value=r?r.a:"";
  document.getElementById("ovl").classList.add("show");
}
function closeEdit(){document.getElementById("ovl").classList.remove("show");editing=null;}
document.getElementById("mCancel").onclick=closeEdit;
document.getElementById("ovl").onclick=e=>{if(e.target.id==="ovl")closeEdit();};
document.getElementById("mClear").onclick=async()=>{
  if(!editing)return;delete state.results[editing.id];
  if(SEED[editing.id])delete SEED[editing.id]; /* permitir borrar también los precargados */
  await save();closeEdit();render();
};
document.getElementById("mSave").onclick=async()=>{
  if(!editing)return;const m=editing;
  if(m.id>=73){
    const hn=document.getElementById("hName").value.trim(),an=document.getElementById("aName").value.trim();
    if(hn&&an&&(hn!==m.h||an!==m.a))state.names[m.id]={h:hn,a:an};
  }
  const hg=document.getElementById("hGoals").value,ag=document.getElementById("aGoals").value;
  if(hg!==""&&ag!=="")state.results[m.id]={h:Math.max(0,+hg),a:Math.max(0,+ag)};
  else if(hg===""&&ag==="")delete state.results[m.id];
  else{note("Pon los goles de los dos equipos (o deja ambos vacíos).",true);return;}
  await save();closeEdit();render();
};

/* ====== EDITOR DE FAVORITOS ====== */
let favSel=[];
function updFavCount(){document.getElementById("favCount").textContent="Elige hasta 3 equipos ("+favSel.length+"/3). Cada uno se destaca con su propio color en el calendario.";}
function openFavs(){
  favSel=[...state.favs];
  const teams=Object.keys(F).sort((a,b)=>a.localeCompare(b,"es"));
  const grid=document.getElementById("tgrid");
  grid.innerHTML=teams.map(t=>`<button class="tbtn ${favSel.includes(t)?"sel":""}" data-t="${esc(t)}">${fl(t)} ${esc(t)}</button>`).join("");
  updFavCount();
  grid.querySelectorAll(".tbtn").forEach(b=>b.onclick=()=>{
    const t=b.dataset.t;
    if(favSel.includes(t)){favSel=favSel.filter(x=>x!==t);b.classList.remove("sel");}
    else if(favSel.length>=3){const fc=document.getElementById("favCount");fc.textContent="⚠️ Máximo 3 equipos: quita uno antes de añadir otro.";setTimeout(updFavCount,1800);return;}
    else{favSel.push(t);b.classList.add("sel");}
    updFavCount();
  });
  document.getElementById("favOvl").classList.add("show");
}
document.getElementById("favCancel").onclick=()=>document.getElementById("favOvl").classList.remove("show");
document.getElementById("favOvl").onclick=e=>{if(e.target.id==="favOvl")document.getElementById("favOvl").classList.remove("show");};
document.getElementById("favSave").onclick=async()=>{
  state.favs=favSel.slice(0,3);
  if(filter.indexOf("fav:")===0&&favIdx(filter.slice(4))<0)filter="all";
  await save();
  document.getElementById("favOvl").classList.remove("show");
  render();
};

/* ====== TABS ====== */
document.getElementById("tabBtn").onclick=()=>{view=view==="list"?"groups":"list";render();};

/* ====== ACTUALIZACIÓN AUTOMÁTICA (TheSportsDB, gratuita) ====== */
const API="https://www.thesportsdb.com/api/v1/json/123/";
const ALIAS={};
(function(){
  const T={"México":["mexico"],"Sudáfrica":["south africa"],"Corea del Sur":["south korea","korea republic","korea rep"],
  "Chequia":["czech republic","czechia"],"Canadá":["canada"],"Bosnia":["bosnia herzegovina","bosnia and herzegovina","bosnia"],
  "Catar":["qatar"],"Suiza":["switzerland"],"Brasil":["brazil"],"Marruecos":["morocco"],"Haití":["haiti"],"Escocia":["scotland"],
  "EE. UU.":["usa","united states","united states of america"],"Paraguay":["paraguay"],"Australia":["australia"],
  "Turquía":["turkey","turkiye"],"Alemania":["germany"],"Curazao":["curacao"],"Costa de Marfil":["ivory coast","cote divoire","cote d ivoire"],
  "Ecuador":["ecuador"],"Países Bajos":["netherlands","holland"],"Japón":["japan"],"Suecia":["sweden"],"Túnez":["tunisia"],
  "Bélgica":["belgium"],"Egipto":["egypt"],"Irán":["iran"],"Nueva Zelanda":["new zealand"],"España":["spain"],
  "Cabo Verde":["cape verde","cabo verde"],"Arabia Saudí":["saudi arabia"],"Uruguay":["uruguay"],"Francia":["france"],
  "Senegal":["senegal"],"Irak":["iraq"],"Noruega":["norway"],"Argentina":["argentina"],"Argelia":["algeria"],"Austria":["austria"],
  "Jordania":["jordan"],"Portugal":["portugal"],"RD Congo":["dr congo","congo dr","democratic republic of congo","congo"],
  "Uzbekistán":["uzbekistan"],"Colombia":["colombia"],"Inglaterra":["england"],"Croacia":["croatia"],"Ghana":["ghana"],"Panamá":["panama"]};
  for(const k in T){ALIAS[normName(k)]=k;T[k].forEach(v=>ALIAS[v]=k);}
})();
function normName(x){return String(x).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9 ]+/g," ").replace(/\s+/g," ").trim();}
function canon(x){const n=normName(x);return ALIAS[n]||n;}
function dayDiff(a,b){return Math.abs((new Date(a+"T12:00:00")-new Date(b+"T12:00:00"))/86400000);}
function eventDone(e){
  if(e.intHomeScore==null||e.intAwayScore==null||e.intHomeScore===""||e.intAwayScore==="")return false;
  const st=String(e.strStatus||"").toUpperCase();
  if(st===""||st==="FT"||st==="AET"||st==="PEN"||st==="MATCH FINISHED"||st==="FINISHED")return true;
  return false;
}
function applyEvents(events){
  let n=0;
  for(const e of events||[]){
    if(String(e.idLeague||"4429")!=="4429")continue;
    if(!eventDone(e))continue;
    const ch=canon(e.strHomeTeam),ca=canon(e.strAwayTeam),d=e.dateEvent||"";
    for(const m of M){
      if(res(m))continue;
      const mh=canon(teamName(m,"h")),ma=canon(teamName(m,"a"));
      if(dayDiff(m.dt.slice(0,10),d)>1)continue;
      if(mh===ch&&ma===ca){state.results[m.id]={h:+e.intHomeScore,a:+e.intAwayScore};n++;break;}
      if(mh===ca&&ma===ch){state.results[m.id]={h:+e.intAwayScore,a:+e.intHomeScore};n++;break;}
    }
  }
  return n;
}
async function fetchJson(url){
  const r=await fetch(url);
  if(!r.ok)throw new Error("HTTP "+r.status);
  return r.json();
}
async function runUpdate(silent){
  let n=0;
  /* 1) últimos 15 partidos terminados del Mundial */
  const past=await fetchJson(API+"eventspastleague.php?id=4429");
  n+=applyEvents(past.events);
  /* 2) relleno por días para partidos antiguos que sigan sin resultado */
  const now=new Date();
  const missingDates=[...new Set(M.filter(m=>!res(m)&&m.id<73)
    .filter(m=>{const t=new Date(m.dt.replace("T"," ").replace(/-/g,"/"));return (now-t)>3*3600000;})
    .map(m=>m.dt.slice(0,10)))].slice(0,8);
  for(const d of missingDates){
    try{const day=await fetchJson(API+"eventsday.php?d="+d+"&l=FIFA%20World%20Cup");n+=applyEvents(day.events);}catch(e){}
  }
  if(n){await save();render();}
  if(!silent)note(n?("Actualizados "+n+" resultado"+(n>1?"s":"")+" ✅"):"Todo al día: no hay resultados nuevos.");
  return n;
}
document.getElementById("updBtn").onclick=async function(){
  const btn=this;btn.disabled=true;btn.innerHTML='<span class="spin"></span>Buscando…';
  try{await runUpdate(false);}
  catch(e){note("Sin conexión o servicio no disponible. Puedes introducir los resultados a mano tocando cada partido.",true);}
  finally{btn.disabled=false;btn.innerHTML="🔄 Actualizar resultados";}
};
/* actualización silenciosa al abrir la app */
setTimeout(()=>{runUpdate(true).catch(()=>{});},800);

load();
</script>
